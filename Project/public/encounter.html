         -->
         <h1>UFO Sightings Database Project</h1>
         <h3>Database Connection Status: 
             <!-- An in-line placeholder to display connection status. -->

             <!-- A loading GIF, will be hided once get the status. -->
             <img id="loadingGif" class="loading-gif" src="loading_100px.gif" alt="Loading...">
         </h3>
         <br><hr><br>
     
         <ul class = "navbar">
            <li><a href = "index.html">Reports</a></li>

        </ul>

    <br><hr><br> <!-- ========================================================================= -->
    <!-- Show 'Encounter'. 
        Data will be fetched and inserted here dynamically using JavaScript. -->
    <h2>Show Encounters</h2>
    <table id="encounterTable" border="1">
        <thead>
            <tr>
                <!--Table head, need to be adjusted accordingly to align with your own.-->
                <th>encounter_ID</th>
                <th>latitude</th>
                <th>longitude</th>
                <th>duration</th>
                <th>verified</th>
                <th>encounter_time</th>
                <th>weather</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <br><hr><br> <!-- ========================================================================= -->
    <h2>Delete Encounter</h2>
    <form id="deleteEncounterForm">
        Encounter: <input type="number" id="deleteEncounterID" min = "0" placeholder="Enter Encounter ID" required> <br><br>
        <button type="submit"> Delete </button> <br>
    </form>
    <div id="deleteEncounterMsg"></div> <br>

    <!-- ===================================================================================== -->
    <!-- External JavaScript file that contains the functionality/logic for the operations above. -->
    <script src="scripts.js"></script>
